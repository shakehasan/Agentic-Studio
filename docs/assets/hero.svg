<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Marketing Swarm - local agent workflow platform</title>
  <desc id="desc">A dark hero banner with a supervisor node connected to ten specialist nodes in an agent mesh.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="0.92"/>
      <stop offset="45%" stop-color="#0f172a" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" rx="28" fill="url(#glow)"/>
  <path d="M0 255 C180 210 300 300 480 246 C650 195 745 245 900 205 C1030 172 1110 188 1200 140" fill="none" stroke="#1e293b" stroke-width="2"/>
  <g opacity="0.28">
    <circle cx="1040" cy="72" r="150" fill="#06b6d4"/>
    <circle cx="845" cy="260" r="110" fill="#8b5cf6"/>
    <circle cx="112" cy="72" r="120" fill="#22c55e"/>
  </g>
  <g transform="translate(770 36)" filter="url(#softGlow)">
    <g stroke="url(#line)" stroke-width="2.2" opacity="0.78">
      <line x1="170" y1="124" x2="72" y2="42"/>
      <line x1="170" y1="124" x2="160" y2="30"/>
      <line x1="170" y1="124" x2="250" y2="42"/>
      <line x1="170" y1="124" x2="308" y2="94"/>
      <line x1="170" y1="124" x2="300" y2="176"/>
      <line x1="170" y1="124" x2="236" y2="236"/>
      <line x1="170" y1="124" x2="124" y2="246"/>
      <line x1="170" y1="124" x2="48" y2="184"/>
      <line x1="170" y1="124" x2="28" y2="112"/>
      <line x1="170" y1="124" x2="104" y2="124"/>
    </g>
    <circle cx="170" cy="124" r="40" fill="#2e1065" stroke="#8b5cf6" stroke-width="3"/>
    <text x="170" y="119" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#ede9fe" font-weight="700">SUPERVISOR</text>
    <text x="170" y="136" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#c4b5fd">Campaign Director</text>
    <g fill="#172554" stroke="#3b82f6" stroke-width="2">
      <circle cx="72" cy="42" r="20"/>
      <circle cx="160" cy="30" r="20"/>
      <circle cx="250" cy="42" r="20"/>
      <circle cx="308" cy="94" r="20"/>
      <circle cx="300" cy="176" r="20"/>
      <circle cx="236" cy="236" r="20"/>
      <circle cx="124" cy="246" r="20"/>
      <circle cx="48" cy="184" r="20"/>
      <circle cx="28" cy="112" r="20"/>
      <circle cx="104" cy="124" r="20"/>
    </g>
    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#dbeafe" font-weight="700" text-anchor="middle">
      <text x="72" y="45">R</text>
      <text x="160" y="33">CI</text>
      <text x="250" y="45">CS</text>
      <text x="308" y="97">CW</text>
      <text x="300" y="179">SEO</text>
      <text x="236" y="239">SOC</text>
      <text x="124" y="249">EM</text>
      <text x="48" y="187">CR</text>
      <text x="28" y="115">QA</text>
      <text x="104" y="127">AN</text>
    </g>
  </g>
  <g transform="translate(64 74)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="1" fill="#f8fafc">Agentic Marketing Swarm</text>
    <text x="2" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#c4b5fd">local multi-user agent workflow platform</text>
    <rect x="2" y="76" width="472" height="1.5" fill="url(#line)" opacity="0.92"/>
    <text x="2" y="112" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#cbd5e1">11 agents. Local-first inference. RAG, memory, guardrails, evals, and HITL.</text>
    <text x="2" y="140" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#94a3b8">Built as a production-grade campaign orchestration platform - June 2026.</text>
  </g>
</svg>
